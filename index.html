<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LigthTrim Photonics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #1a2a4a;
    --bg2:       #2a3a5a;
    --surface:   #3a4a6a;
    --border:    rgba(255,255,255,.2);
    --accent:    #8b1538;
    --accent2:   #a83a5a;
    --accent3:   #ffffff;
    --text:      #ffffff;
    --muted:     #c0c0c0;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 48px;
    background: rgba(26,42,74,.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: padding .3s;
  }
  .nav-logo {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -.01em;
    color: var(--accent3);
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 10px var(--accent2);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 6px var(--accent2); }
    50%      { box-shadow: 0 0 18px var(--accent2), 0 0 30px rgba(168,58,90,.4); }
  }
  .nav-links {
    display: flex; gap: 36px; list-style: none;
  }
  .nav-links a {
    text-decoration: none;
    color: var(--muted);
    font-size: .8rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--accent2); }
  .nav-cta {
    padding: 9px 22px;
    border: 1px solid var(--accent2);
    border-radius: 4px;
    color: var(--accent3);
    text-decoration: none;
    font-size: .78rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    transition: background .2s, color .2s;
  }
  .nav-cta:hover { background: var(--accent2); color: var(--bg); }

  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 140px 24px 80px;
    position: relative;
    overflow: hidden;
  }
  #hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(139,21,56,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,21,56,.03) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 40%, transparent 100%);
  }
  #beam-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: .72rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp .8s .2s forwards;
  }
  .hero-h1 {
    font-family: var(--font-head);
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -.02em;
    color: var(--accent3);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp .9s .35s forwards;
  }
  .hero-h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    max-width: 560px;
    color: var(--muted);
    font-size: .95rem;
    margin-bottom: 44px;
    opacity: 0;
    animation: fadeUp .9s .5s forwards;
  }
  .hero-actions {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    opacity: 0;
    animation: fadeUp .9s .65s forwards;
  }
  .btn-primary {
    padding: 14px 32px;
    background: var(--accent2);
    color: var(--accent3);
    border-radius: 4px;
    text-decoration: none;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: .9rem;
    letter-spacing: .04em;
    transition: box-shadow .2s, transform .2s;
  }
  .btn-primary:hover {
    box-shadow: 0 0 30px rgba(139,21,56,.45);
    transform: translateY(-2px);
  }
  .btn-ghost {
    padding: 14px 32px;
    border: 1px solid var(--border);
    color: var(--accent3);
    border-radius: 4px;
    text-decoration: none;
    font-family: var(--font-head);
    font-weight: 600;
    font-size: .9rem;
    letter-spacing: .04em;
    transition: border-color .2s, color .2s;
  }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }

  .scroll-hint {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    opacity: 0; animation: fadeIn 1s 1.4s forwards;
  }
  .scroll-hint span { font-size: .65rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--accent2), transparent);
    animation: scrollAnim 1.8s ease-in-out infinite;
  }
  @keyframes scrollAnim {
    0%   { transform: scaleY(0); transform-origin: top; }
    50%  { transform: scaleY(1); transform-origin: top; }
    51%  { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }

  #stats {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 40px 24px;
  }
  .stats-inner {
    max-width: 960px; margin: auto;
    display: flex; flex-wrap: wrap; justify-content: space-around; gap: 32px;
  }
  .stat {
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity .6s, transform .6s;
  }
  .stat.visible { opacity: 1; transform: none; }
  .stat-num {
    font-family: var(--font-head);
    font-size: 2.6rem;
    font-weight: 800;
    color: var(--accent3);
    letter-spacing: -.03em;
  }
  .stat-num span { color: var(--accent2); }
  .stat-label { font-size: .72rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }

  section { padding: 100px 24px; }
  .section-inner { max-width: 960px; margin: auto; }
  .section-tag {
    display: inline-block;
    font-size: .68rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
    opacity: 0; transform: translateY(16px);
    transition: opacity .5s, transform .5s;
  }
  .section-tag.visible { opacity: 1; transform: none; }
  .section-h2 {
    font-family: var(--font-head);
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    font-weight: 700;
    color: var(--accent3);
    letter-spacing: -.02em;
    line-height: 1.2;
    margin-bottom: 20px;
    opacity: 0; transform: translateY(20px);
    transition: opacity .6s .1s, transform .6s .1s;
  }
  .section-h2.visible { opacity: 1; transform: none; }
  .section-p {
    max-width: 560px;
    color: var(--muted);
    font-size: .9rem;
    opacity: 0; transform: translateY(20px);
    transition: opacity .6s .2s, transform .6s .2s;
  }
  .section-p.visible { opacity: 1; transform: none; }

  #team {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  #team .section-tag {
    margin-bottom: 16px;
  }
  #team .section-h2 {
    margin-bottom: 20px;
  }
  #team .section-p {
    max-width: 600px;
    margin: 0 auto 30px;
  }

  #about .section-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .about-visual {
    position: relative;
    height: 340px;
    opacity: 0; transform: translateX(-30px);
    transition: opacity .8s .2s, transform .8s .2s;
  }
  .about-visual.visible { opacity: 1; transform: none; }
  .about-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--border);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .about-ring:nth-child(1) { width: 280px; height: 280px; animation: spin 18s linear infinite; }
  .about-ring:nth-child(2) { width: 200px; height: 200px; border-style: dashed; opacity: .5; animation: spin 12s linear infinite reverse; }
  .about-ring:nth-child(3) { width: 110px; height: 110px; border-color: var(--accent2); opacity: .7; animation: spin 6s linear infinite; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
  .about-core {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 30px var(--accent2), 0 0 80px rgba(168,58,90,.3);
  }
  .about-orbit {
    position: absolute;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    top: calc(50% - 4px); left: calc(50% - 4px);
    transform-origin: -136px 0;
    animation: orbit 4s linear infinite;
  }
  @keyframes orbit {
    to { transform: rotate(360deg); }
  }
  .about-text .section-p { max-width: 100%; }

  #waitlist {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid
